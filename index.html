<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paul Maggio · MIH — Operational Clarity for Owner-Led Businesses</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body { background: #F8F6F2; color: #1A1918; }
    :root {
      --color-navy: #1B2B42;
      --color-green: #2A4535;
      --color-bg: #F8F6F2;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; }
    input, textarea, select {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #2A4535 !important;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F8F6F2; }
    ::-webkit-scrollbar-thumb { background: #C8C3BC; border-radius: 3px; }
    @media (max-width: 768px) {
      .hide-mobile { display: none !important; }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
